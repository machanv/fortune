<div class="app-container">
  <aside class="side-bar">
    <div class="nav-bar">
      <header class="header">
        <p>{{title}}</p>
      </header>
      <ul>
        <li *ngFor="let item of navList">
          <a routerLink="{{item.link}}"><span class="iconfont {{item.icon}}"></span>{{item.name}}</a>
        </li>
      </ul>
    </div>
    <div class="login"><a (click)="gotoBackend()">登录</a></div>
  </aside>
  <div id="subappViewport" class="sub-viewport"></div>
</div>
